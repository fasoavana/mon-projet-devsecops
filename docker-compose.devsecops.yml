version: "3.8"

services:
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    depends_on:
      - sonar-db
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - ./devsecops/sonarqube/data:/opt/sonarqube/data
      - ./devsecops/sonarqube/logs:/opt/sonarqube/logs
      - ./devsecops/sonarqube/extensions:/opt/sonarqube/extensions
    networks:
      - cicd-network
    restart: unless-stopped

  sonar-db:
    image: postgres:15-alpine
    container_name: sonar-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - ./devsecops/sonarqube/postgresql:/var/lib/postgresql/data
    networks:
      - cicd-network
    restart: unless-stopped

networks:
  cicd-network:
    driver: bridge
