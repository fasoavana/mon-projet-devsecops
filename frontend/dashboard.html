<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord - Secure Reservation App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { margin-bottom: 30px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Secure Reservation App</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-item nav-link text-light me-3" id="user-email"></span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Déconnexion</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="alert-container"></div>
        
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow mb-4">
                    <div class="card-body">
                        <h5 class="card-title" id="form-title">Nouvelle Réservation</h5>
                        <form id="reservation-form">
                            <input type="hidden" id="reservation-id">
                            <div class="mb-3">
                                <label for="date" class="form-label">Date</label>
                                <input type="date" class="form-control" id="date" required>
                            </div>
                            <div class="mb-3">
                                <label for="time" class="form-label">Heure</label>
                                <input type="time" class="form-control" id="time" required>
                            </div>
                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" rows="3" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100" id="submit-btn">Réserver</button>
                            <button type="button" class="btn btn-secondary w-100 mt-2 d-none" id="cancel-btn" onclick="resetForm()">Annuler</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-body">
                        <h5 class="card-title">Mes Réservations</h5>
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Heure</th>
                                        <th>Description</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="reservations-list">
                                    <!-- Les réservations seront insérées ici par JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Vérifier si l'utilisateur est connecté
        if (!localStorage.getItem('token')) {
            window.location.href = 'login.html';
        }

        // Charger les données au démarrage
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await getMe();
            if (user) {
                document.getElementById('user-email').textContent = user.email;
                loadReservations();
            } else {
                logout();
            }
        });

        // Gérer la soumission du formulaire
        document.getElementById('reservation-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('reservation-id').value;
            const data = {
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                description: document.getElementById('description').value
            };
            
            let success;
            if (id) {
                success = await updateReservation(id, data);
            } else {
                success = await createReservation(data);
            }
            
            if (success) {
                resetForm();
                loadReservations();
            }
        });

        async function loadReservations() {
            const reservations = await getReservations();
            const list = document.getElementById('reservations-list');
            list.innerHTML = '';
            
            if (reservations && reservations.length > 0) {
                reservations.forEach(res => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${res.date}</td>
                        <td>${res.time}</td>
                        <td>${res.description}</td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="editReservation(${res.id}, '${res.date}', '${res.time}', '${res.description}')">Modifier</button>
                            <button class="btn btn-sm btn-danger" onclick="handleDelete(${res.id})">Supprimer</button>
                        </td>
                    `;
                    list.appendChild(tr);
                });
            } else {
                list.innerHTML = '<tr><td colspan="4" class="text-center">Aucune réservation trouvée</td></tr>';
            }
        }

        function editReservation(id, date, time, description) {
            document.getElementById('reservation-id').value = id;
            document.getElementById('date').value = date;
            document.getElementById('time').value = time;
            document.getElementById('description').value = description;
            
            document.getElementById('form-title').textContent = 'Modifier la Réservation';
            document.getElementById('submit-btn').textContent = 'Mettre à jour';
            document.getElementById('cancel-btn').classList.remove('d-none');
        }

        function resetForm() {
            document.getElementById('reservation-form').reset();
            document.getElementById('reservation-id').value = '';
            document.getElementById('form-title').textContent = 'Nouvelle Réservation';
            document.getElementById('submit-btn').textContent = 'Réserver';
            document.getElementById('cancel-btn').classList.add('d-none');
        }

        async function handleDelete(id) {
            if (confirm('Êtes-vous sûr de vouloir supprimer cette réservation ?')) {
                const success = await deleteReservation(id);
                if (success) {
                    loadReservations();
                }
            }
        }
    </script>
</body>
</html>
