# Configuration de Harbor pour Projet DevSecOps
# Version: 2.10.0

# Adresse d'accès (localhost pour test local)
hostname: localhost

# Configuration HTTP (Port 9090 comme dans ton .env)
http:
  port: 9090

# Configuration HTTPS - DÉSACTIVÉE pour le mode Dev
# (Commentez ces lignes pour éviter les erreurs SSL)
# https:
#   port: 443
#   certificate: /your/certificate/path
#   private_key: /your/private/key/path

# Mot de passe administrateur par défaut (Harbor12345)
harbor_admin_password: Harbor12345

# Configuration de la base de données interne
database:
  password: root123
  max_idle_conns: 100
  max_open_conns: 900
  conn_max_lifetime: 5m
  conn_max_idle_time: 0

# Volume de stockage des images et données
data_volume: /data/harbor

# Configuration du scanner de vulnérabilités (Crucial pour DevSecOps)
trivy:
  ignore_unfixed: false
  skip_update: false
  offline_scan: false
  security_check: vuln
  insecure: false

# Configuration des logs
log:
  level: info
  local:
    rotate_count: 50
    rotate_size: 200M
    location: /var/log/harbor

# Paramètres des Jobs
jobservice:
  max_job_workers: 10
  job_loggers:
    - STD_OUTPUT
    - FILE
  logger_sweeper_duration: 1

# Notification Webhook
notification:
  webhook_job_max_retry: 3
  webhook_job_http_client_timeout: 3

# Proxy (Laisser vide si pas de proxy entreprise)
proxy:
  http_proxy:
  https_proxy:
  no_proxy:
  components:
    - core
    - jobservice
    - trivy

# Purge automatique des uploads temporaires
upload_purging:
  enabled: true
  age: 168h
  interval: 24h
  dryrun: false

# Cache pour améliorer les performances de pull
cache:
  enabled: false
  expire_hours: 24

_version: 2.10.0
